<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rmgo.net — Encurtador de Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7c3aed;
      --purple-light: #8b5cf6;
      --purple-dark: #6d28d9;
      --purple-glow: rgba(124, 58, 237, 0.25);
      --bg: #0f0f1a;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.1);
      --text: #f1f1f1;
      --text-muted: #9ca3af;
      --success: #10b981;
      --danger: #ef4444;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 16px 64px;
      color: var(--text);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,58,237,0.3), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(99,102,241,0.15), transparent);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown .5s ease both;
    }
    .header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .header .logo span {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: .95rem;
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      backdrop-filter: blur(12px);
      margin-bottom: 20px;
      animation: fadeUp .5s ease both;
    }
    .card:nth-child(2) { animation-delay: .05s; }

    .card-title {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    /* Form */
    .input-wrapper {
      position: relative;
      margin-bottom: 10px;
    }
    .input-wrapper .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px 13px 42px;
      font-size: .95rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      outline: none;
      border-color: var(--purple-light);
      box-shadow: 0 0 0 3px var(--purple-glow);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
      position: relative;
      overflow: hidden;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn.loading { pointer-events: none; opacity: .7; }
    .btn.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
      animation: shimmer 1s infinite;
    }

    .msg {
      font-size: .85rem;
      color: var(--danger);
      margin-top: 8px;
      min-height: 18px;
    }

    /* Result box */
    .result {
      margin-top: 16px;
      padding: 16px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 10px;
      display: none;
      animation: fadeUp .3s ease;
    }
    .result-label {
      font-size: .75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 6px;
    }
    .result-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .result a {
      color: #a78bfa;
      font-weight: 600;
      font-size: 1.05rem;
      text-decoration: none;
      word-break: break-all;
      flex: 1;
    }
    .result a:hover { text-decoration: underline; }
    .copy-btn {
      flex-shrink: 0;
      width: auto;
      padding: 7px 16px;
      font-size: .82rem;
      border-radius: 8px;
      font-weight: 500;
      margin-top: 0;
    }
    .copy-btn.copied {
      background: rgba(16,185,129,0.2);
      border-color: rgba(16,185,129,0.4);
      color: #6ee7b7;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e2e;
      border: 1px solid rgba(124,58,237,0.4);
      color: #fff;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: .9rem;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 32px 12px 48px; }
      .header .logo { font-size: 1.6rem; }
      .card { padding: 20px 16px; }
      .result-row { flex-direction: column; align-items: flex-start; }
      .copy-btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🔗 <span>Encurtador de link</span></div>
    <p>Cole seu link longo e receba um curto e fácil de compartilhar.</p>
  </div>

  <div class="card">
    <p class="card-title">Novo link</p>
    <div class="input-wrapper">
      <span class="icon">🌐</span>
      <input id="urlInput" type="url" placeholder="https://exemplo.com/seu-link-muito-longo" />
    </div>

    <button class="btn" id="shortenBtn" onclick="shorten()">Encurtar link</button>
    <p id="msg" class="msg"></p>
    <div id="result" class="result">
      <p class="result-label">Link criado</p>
      <div class="result-row">
        <a id="shortLink" href="#" target="_blank"></a>
        <button class="btn copy-btn" id="copyBtn" onclick="copy()">Copiar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <img src="/logo.png" alt="rmgo.net" style="margin-top:40px;height:150px;opacity:0.85;" />

  <script>
    const API = '/api/urls';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function shorten() {
      const url = document.getElementById('urlInput').value.trim();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('shortenBtn');
      msg.textContent = '';

      if (!url) { msg.textContent = 'Informe uma URL.'; return; }

      btn.textContent = 'Encurtando...';
      btn.classList.add('loading');

      const res = await fetch(`${API}/shorten`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });

      btn.textContent = 'Encurtar link';
      btn.classList.remove('loading');

      const data = await res.json();
      if (!res.ok) { msg.textContent = data.error; return; }

      const el = document.getElementById('shortLink');
      el.href = data.shortUrl;
      el.textContent = data.shortUrl.replace(/^https?:\/\//, '');
      document.getElementById('copyBtn').textContent = 'Copiar';
      document.getElementById('copyBtn').classList.remove('copied');
      document.getElementById('result').style.display = 'block';
      document.getElementById('urlInput').value = '';
    }

    function copy() {
      const text = document.getElementById('shortLink').textContent;
      navigator.clipboard.writeText(text);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copiado ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shorten();
    });
  </script>
</body>
</html>
